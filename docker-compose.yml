version: "3.8"

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cms
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - ./cms.sql:/docker-entrypoint-initdb.d/cms.sql
    networks:
      - internal

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - internal

  cms:
    build:
      context: ./cms
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - internal

networks:
  internal:
    driver: bridge
